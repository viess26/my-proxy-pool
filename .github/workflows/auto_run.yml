name: Auto Update Proxy Pool

on:
  schedule:
    - cron: '0 */6 * * *'  # 更改为：每 6 个小时（每天的 0点, 6点, 12点, 18点）自动执行一次
  workflow_dispatch:        # 依然保留手动触发按钮

jobs:
  run-proxy-pool:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: 🐋 拉取仓库代码
      uses: actions/checkout@v4

    - name: 🐍 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安装依赖库
      run: |
        pip install requests beautifulsoup4

    - name: 🚀 运行爬虫和验证脚本
      run: python fetch_and_verify.py

    - name: 💾 将更新后的数据推送到仓库
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add proxies.json sub.txt nodes_plain.txt || true
        git commit -m "自动更新节点订阅源" || exit 0
        git push
